services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./database.db:/app/database.db

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    depends_on:
      - app